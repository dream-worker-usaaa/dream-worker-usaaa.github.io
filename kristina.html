<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframe по центру</title>
   <style>
        /* === ЭТО CSS (ЗДЕСЬ НАСТРАИВАЕМ ВНЕШНИЙ ВИД) === */
        
        /* Убираем отступы и центрируем контент по середине экрана */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center; /* Центр по горизонтали */
            align-items: center;     /* Центр по вертикали */
            overflow: hidden;        /* Убираем лишнюю прокрутку у самой страницы */
            background-color: #000;  /* Чёрный фон, пока грузится видео */
        }

        /* Стили для фонового видео */
        .bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover; /* Видео заполнит весь экран */
            z-index: -1;       /* Прячем видео на самый задний план */
        }

        /* Настройка ползунка (скроллбара) внутри iframe */
        ::-webkit-scrollbar {
            width: 4px; /* Чуть тоньше для аккуратности */
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.5); /* Полупрозрачный трек */
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #0f0; /* Ярко-зелёный скролл под стиль интерфейса */
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #0f0;
        }

        /* Окно монитора, в котором лежит сайт */
        .wrapper {
            position: relative;  /* Обязательно для наложения эффектов */
            width: 1100px;        /* Подкручено под монитор */
            height: 780px;       /* Подкручено под монитор */
            border: none;
            border-radius: 32px;  /* Легкое закругление */
            overflow: hidden;    /* Скрываем всё, что вылезает */
            z-index: 1;
            background-color: #000; 
            
            /* Твои параметры позиционирования */
            margin-top: -670px; 
            margin-left: -90px;   
            transform: scale(1.1); 
            
            /* Эффект свечения самого экрана monitora */
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2); 
        }

        /* === ЭФФЕКТ СТАРЫХ ТВ ПОЛОС (ОВЕРЛЕЙ) === */
        .wrapper::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            
            /* 1. Создаем горизонтальные полоски (Scanlines) с помощью градиента */
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15), /* Цвет полоски (черный, очень прозрачный) */
                rgba(0, 0, 0, 0.15) 1px, /* Толщина полоски */
                transparent 1px, /* Прозрачный промежуток */
                transparent 2px  /* Ширина промежутка */
            );
            
            /* 2. Добавляем виньетку (затемнение по углам для объема) */
            box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.6);
            
            /* 3. ОЧЕНЬ ВАЖНО: Мышь игнорирует этот слой, клики проходят сквозь него */
            pointer-events: none; 
            
            z-index: 2; /* Слой лежит поверх iframe */
            border-radius: inherit; /* Наследует закругление углов */
        }

        /* Сам встраиваемый сайт (iframe) */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1; /* Лежит под эффектом полос */
        }
    </style>
</head>
<body>
    <video autoplay loop muted playsinline class="bg-video">
       <source src="https://dream-worker-usaaa.github.io/back_video.mp4" 
           type="video/mp4">
    </video>

    <div class="wrapper">
        <iframe src="https://agentsofanomalies.framer.website/" scrolling="yes"></iframe>
    </div>

</body>
</html>
