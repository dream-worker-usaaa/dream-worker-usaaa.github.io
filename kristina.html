<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframe по центру</title>
    <style>
        /* === ЭТО CSS (ЗДЕСЬ НАСТРАИВАЕМ ВНЕШНИЙ ВИД) === */
        
        /* Убираем отступы и центрируем контент по середине экрана */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center; /* Центр по горизонтали */
            align-items: center;     /* Центр по вертикали */
            overflow: hidden;        /* Убираем лишнюю прокрутку у самой страницы */
        }

        /* Стили для фонового видео */
        .bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover; /* Видео заполнит весь экран */
            z-index: -1;       /* Прячем видео на самый задний план */
        }

        /* Настройка ползунка (скроллбара) */
        ::-webkit-scrollbar {
            width: 12px;
        }
        ::-webkit-scrollbar-track {
            background: #000000; 
            border-radius: 1px;
        }
        ::-webkit-scrollbar-thumb {
            background: #000000; 
            border-radius: 1px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #000000;
        }

        /* Окно, в котором будет лежать ваш сайт */
        .wrapper {
            width: 1025px;
            height: 756px;
            border: 1px solid #000;
            border-radius: 8px;
            overflow-y: scroll;
            overflow-x: hidden;
            z-index: 1; /* Окно будет поверх видео */
            background-color: #fff; /* Белый фон, чтобы видео не просвечивало сквозь сайт, если он прозрачный */
        }

        /* Сам встраиваемый сайт (iframe) */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <video autoplay loop muted playsinline class="bg-video">
        <source src="back_video.mp4" type="video/mp4">
    </video>

    <div class="wrapper">
        <iframe src="https://agentsofanomalies.framer.website/" scrolling="no"></iframe>
    </div>

</body>
</html>
