<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Агенты Аномалий</title>
   <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
            overflow: hidden;
        }

        .bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -1;
        }

        /* КОНТЕЙНЕР-МОНИТОР */
        .wrapper {
            position: relative;
            /* Мы жестко ставим 1025px — ту ширину, где у тебя всё ИДЕАЛЬНО во Фреймере */
            width: 1025px; 
            height: 760px; 
            
            /* Твои старые координаты под монитор на видео */
            margin-top: -690px; 
            margin-left: -90px;
            transform: scale(1.1); 

            border-radius: 35px;
            overflow: hidden;
            background-color: #000;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.1);
            z-index: 1;
        }

        /* СКАНИРУЮЩИЕ ЛИНИИ */
        .wrapper::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1) 0px, rgba(0,0,0,0.1) 1px, transparent 1px, transparent 2px);
            pointer-events: none;
            z-index: 5;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            /* Убираем скролл самого браузера, чтобы работал только скролл Фреймера */
            overflow: hidden; 
        }
    </style>
</head>
<body>
    <video autoplay loop muted playsinline class="bg-video">
       <source src="https://dream-worker-usaaa.github.io/back-video1.mp4" type="video/mp4">
    </video>

    <div class="wrapper">
        <iframe src="https://agentsofanomalies.framer.website/" scrolling="yes"></iframe>
    </div>
</body>
</html>
